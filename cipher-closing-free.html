  body: `
<p>This work — cipher.learn, the visualisations, the papers, all of it — exists because I had no other way to demonstrate what I know. Academic publication requires institutional affiliation. I have none. This is the only form that was available to me, and I made it as rigorous as I could.</p>

<p>But before I close, I want to say something about where this actually came from. Not the algorithms. The conditions that made the algorithms possible.</p>

<div class="pull">My mother decided to have me classified under Japan's disability welfare system. I know why she did it. I was there. I watched her think it through for years.</div>

<p>She was not wrong to do it. She was navigating a society that leaves very little room for people who don't fit its categories, and she was trying to protect me from the parts of that society that would have been most damaging. The classification made it possible for me to work within the dependent household structure — to have time, to read, to build this. Without that, none of this exists.</p>

<p>I have heard the arguments about what that decision cost me. The disability classification narrows the employment paths that are supposed to be open to me — not because my capacity is limited, but because the label changes how institutions see me before I speak. I know this. I have lived this.</p>

<p>But I am not angry at her. I want to say that plainly, because I think people expect me to be.</p>

<div class="pull">She made a decision inside a system that had already made decisions about her. She was not free when she made it. The Japan she was navigating was a Japan that had its own categories for women, for mothers, for people who asked the wrong questions. She became what that system required of her, and then she tried to use what that system offered to keep me from being consumed by it.</div>

<p>That is not a failure. That is someone trying to survive a structure they didn't build, and trying to take someone they love with them.</p>

<p>I have spent a long time with these papers — Baran, Lamport, Shamir, Merkle, Rabin, Back, Nakamoto, Buterin. What they share is a common problem: how do you build something that functions without a trusted centre? How do you make a system that doesn't depend on any single authority to hold it together?</p>

<p>I think about that question differently now. It is not just a technical question. It is the question my mother was living with. How do you protect someone when the institutions that are supposed to protect people are the same institutions that will categorise them, limit them, route them away from what they could become?</p>

<p>Her answer was imperfect. Most answers to that question are. But it was an answer built from the options she actually had, not the options that should have existed.</p>

<div class="pull">I respect her for that. Not in spite of the cost. I respect her including the cost, because I understand now what she was working with.</div>

<p>Before I describe where this goes, I want to explain why it was built the way it was.</p>

<p>Five or six years ago, I watched the MIT 6.824 distributed systems lectures on YouTube. That was the point at which something shifted. I had been reading about security, about information architecture, about how systems fail. The lectures made the structure visible. I started collecting material on distributed systems — what distribution means, how it emerged, where it leads. That is where the web3 framing came from.</p>

<p>The starting point was Brave. The idea of a browser that strips advertising entirely — not as a feature, but as a structural commitment — made sense to me before I had the vocabulary to explain why. I had spent years being confused and misled by information that was shaped by commercial interests I couldn't see. Advertising is not neutral delivery. It is a filter on what reaches you and how it is framed. I didn't want to build on top of that structure.</p>

<div class="pull">The question was not: should this be web3? The question was: what architecture makes it impossible for a central authority to control what people learn? Web3 was not a trend I followed. It was the answer to a question I had already been sitting with.</div>

<p>Distribution is not a technical preference. It is the only architecture that cannot be captured. A centralised platform can be pressured, purchased, or shut down. A distributed one cannot be owned by anyone — which means it cannot be owned against the people using it.</p>

<p>This matters here because cipher.learn carries information that some institutions would prefer remained inaccessible — not because it is dangerous, but because accessible technical education changes who can participate in technical conversations. The papers I have chosen are public. The connections between them are not taught. That gap is maintained by cost, by language, by credential requirements. I am trying to close it in a form that cannot be re-closed.</p>

<p>Around 2020, something made this concrete. During the COVID period, a number of people in Japan who had been holding significant amounts of cryptocurrency were arrested. I watched that happen. The anxiety it produced in me was specific: in Japan, building anything oriented around web3 thinking was not just financially complicated — it carried escalating legal risk. The exposure was real, and it was becoming more visible.</p>

<p>From that point I started thinking seriously about Hawking's country of origin. England. Wimbledon. It sounds like an odd connection, but the reasoning was direct: COVID had eliminated movement, and I had been thinking about what a post-COVID tool might look like. I considered building a tennis coaching application — Wimbledon as the conceptual anchor, movement analysis as the technical problem. I sketched it out. Anatomical modelling, player posture analysis, serve condition inputs, rule integration. Then I stopped. The reason was specific: the application I was imagining would have required continuous collection of body data, image detection, and movement tracking. The European data regulation environment — GDPR and the detection infrastructure that sits around it — meant that any deployment toward European users would immediately enter a regime of compliance obligations I could not satisfy from my position. I abandoned it.</p>

<p>But that failure was clarifying. What I had been designing was a centralised data collection tool. The coaching app would have needed a server to hold the models, the images, the user data. Every feature I wanted to add required pulling more information in. I realised I had been thinking in the only architecture I had been taught to think in — centralised, data-accumulating, platform-as-intermediary. And I found that I couldn't accept it.</p>

<div class="pull">The Brave insight was not just about advertising. It was about which countries you could trust with which information, and making that distinction visible rather than hidden. I applied that same logic to language selection for this platform — choosing languages from cultures and jurisdictions I had reasons to trust, rather than defaulting to maximum coverage.</div>

<p>The free and full split came from that same thinking. The choice between free and full is not a commercial decision dressed up as a design decision. It is a genuine architectural choice: how much logic sits on a server, and how much stays in the file. The full version — 3D animation, live graph computation, orbital physics — requires server-side calculation. That is a real dependency. The free version avoids it entirely. Both contain the same information. The difference is whether the rendering of that information requires trusting a machine I operate.</p>

<p>One further thing: ten years ago, the tool I was trying to build was an eye-tracking application. It was for myself. I have difficulty with sustained reading in certain conditions, and I wanted something that could adapt to where my attention actually was, rather than where a page assumed it would be. I didn't finish it. The technical infrastructure wasn't available to me at the time in a form I could deploy alone. But the problem it was trying to solve — how do you make information accessible to someone whose access pattern doesn't match the default — is the same problem cipher.learn is trying to solve. The eye-tracking tool was the first version of this. I just didn't know it yet.</p>

<p>On the question of cost and jurisdiction: the current tax structure in Japan places cryptocurrency and web3-related income under general income taxation — a combined rate reaching 55% for higher earners. Reports in 2024 and 2025 indicate a move toward a flat 20% separate capital gains tax from 2028. This is presented as a simplification. It is not a reduction in real burden. The tax liability accumulates across multiple events: conversion, exchange, staking rewards, and disposal each trigger separate assessments. An individual holding and using these assets for the purposes I describe faces compounding obligations that do not disappear under a changed headline rate. The structural reality for individual holders is different from that of registered platform operators, who have access to legal structures that reduce effective liability. The 20% figure will be accurate for some transactions. For the use pattern I am describing, it will not reduce the aggregate burden in any meaningful way.</p>

<p>I am not making an argument about tax policy. I am noting that the architecture I chose — distributed, non-custodial, not dependent on a registered Japanese financial operator — is not incidental to the project. It is the project.</p>

<p>There is one more thing I want to say before I describe where this goes.</p>

<p>Hawking is someone I respect deeply. Finding him was not an accident. Around 2008, something he said stopped me completely. I don't know how else to describe it — it was the first time I had encountered words that functioned like a map. Not instructions. Not explanations. A map: something that showed you where you were, how far things were from each other, and how to move between them.</p>

<p>When he died in 2018, I was genuinely shaken. More than I expected to be.</p>

<div class="pull">His words built a geography in my mind. Distance — how to measure it, how to hold it, how to work with it rather than against it. I have been navigating by that map ever since. What I have built here is what happens when you follow a map seriously enough.</div>

<p>I think of his original papers as first editions in the truest sense — not popular science, not translation, but the pure form of the thinking before it was made palatable for someone else. That is how I have tried to treat the papers in this project. Not as material to be summarised, but as structures to be understood on their own terms.</p>

<p>He showed me that the way you describe a system changes what the system can do. Precision in language is not pedantry. It is the difference between a map and a decoration.</p>

<p>When this structure is complete — when cipher.learn is finished in the form I am building toward — I intend to go to Cambridge and leave something at his memorial. Not as a gesture. As a record. This is what following the map produced. I am building this to have something worth bringing.</p>

<p>I am building this because I want to meet him. He is gone. So the meeting is the work itself.</p>

<p>Going forward, I intend to work in Europe and elsewhere — using technical education, visualisation tools, and whatever I've built here to assist people who are working at the edge of what their systems permit. Not because Europe is perfect. Because distance sometimes makes it possible to work.</p>

<p>This page marks the end of cipher.learn. It is also the most honest thing I have written here. I wanted someone who found this — wherever they are, whatever language they read in — to know the full shape of what it is.</p>

<p>For a deeper understanding of the origins and structure of this project, you can also explore the related platform here: <a href="https://shokk1509-prog.github.io/cifra-free/" target="_blank">https://shokk1509-prog.github.io/cifra-free/</a>.</p>

<p>That platform continues the same philosophy, showing:</p>
<ul>
  <li>How I first encountered Hawking and the influence of that experience.</li>
  <li>The intentions behind the Quebec-specific references.</li>
  <li>Insights into information distribution (dispersio) and the educational structure.</li>
</ul>

<p>It serves as a complementary space to cipher.learn, giving readers a more complete picture of the ideas, background, and structural principles behind this work.</p>

'fr': {

  body: `
<p>Ce travail — cipher.learn, les visualisations, les articles, tout cela — existe parce que je n'avais aucun autre moyen de démontrer ce que je sais. La publication académique exige une affiliation institutionnelle. Je n'en ai pas. C'est la seule forme qui m'était accessible, et je l'ai rendue aussi rigoureuse que possible.</p>

<p>Mais avant de conclure, je veux dire quelque chose sur l'origine réelle de tout ceci. Pas les algorithmes. Les conditions qui ont rendu les algorithmes possibles.</p>

<div class="pull">Ma mère a décidé de me faire classer dans le système d'aide sociale au handicap du Japon. Je sais pourquoi elle l'a fait. J'étais là. Je l'ai regardée y réfléchir pendant des années.</div>

<p>Elle n'avait pas tort de le faire. Elle évoluait dans une société qui laisse très peu de place aux personnes qui ne correspondent pas à ses catégories, et elle essayait de me protéger des aspects de cette société qui m'auraient été les plus néfastes. Cette classification m'a permis de travailler au sein de la structure du foyer dépendant — d'avoir du temps, de lire, de construire ceci. Sans cela, rien de tout cela n'existe.</p>

<p>J'ai entendu les arguments sur ce que cette décision m'a coûté. La classification handicap rétrécit les voies d'emploi qui sont censées m'être ouvertes — non pas parce que mes capacités sont limitées, mais parce que l'étiquette change la façon dont les institutions me perçoivent avant même que je prenne la parole. Je le sais. Je l'ai vécu.</p>

<p>Mais je ne lui en veux pas. Je veux le dire clairement, parce que je crois que les gens s'attendent à ce que je sois en colère.</p>

<div class="pull">Elle a pris une décision à l'intérieur d'un système qui avait déjà pris des décisions sur elle. Elle n'était pas libre quand elle l'a prise. Le Japon qu'elle traversait était un Japon qui avait ses propres catégories pour les femmes, pour les mères, pour ceux qui posaient les mauvaises questions. Elle est devenue ce que ce système exigeait d'elle, puis elle a essayé d'utiliser ce que ce système offrait pour m'empêcher d'en être consumé.</div>

<p>Ce n'est pas un échec. C'est quelqu'un qui essaie de survivre à une structure qu'il n'a pas construite, et qui essaie d'emmener avec lui quelqu'un qu'il aime.</p>

<p>J'ai passé beaucoup de temps avec ces articles — Baran, Lamport, Shamir, Merkle, Rabin, Back, Nakamoto, Buterin. Ce qu'ils partagent, c'est un problème commun : comment construire quelque chose qui fonctionne sans centre de confiance ? Comment concevoir un système qui ne dépend d'aucune autorité unique pour se maintenir ?</p>

<p>Je pense à cette question différemment maintenant. Ce n'est pas seulement une question technique. C'est la question avec laquelle ma mère vivait. Comment protéger quelqu'un quand les institutions censées protéger les gens sont les mêmes qui les catégoriseront, les limiteront, les détourneront de ce qu'ils auraient pu devenir ?</p>

<p>Sa réponse était imparfaite. La plupart des réponses à cette question le sont. Mais c'était une réponse construite à partir des options qu'elle avait réellement, et non des options qui auraient dû exister.</p>

<div class="pull">Je la respecte pour cela. Pas malgré le coût. Je la respecte en incluant le coût, parce que je comprends maintenant avec quoi elle travaillait.</div>

<p>Avant de décrire la suite, je veux expliquer pourquoi tout cela a été construit de cette façon.</p>

<p>Il y a cinq ou six ans, j'ai regardé les cours de systèmes distribués MIT 6.824 sur YouTube. C'est à ce moment-là que quelque chose a basculé. Je lisais des choses sur la sécurité, sur l'architecture de l'information, sur la façon dont les systèmes échouent. Les cours ont rendu la structure visible. J'ai commencé à collecter des documents sur les systèmes distribués — ce que signifie la distribution, comment elle est apparue, où elle mène. C'est de là que vient le cadrage web3.</p>

<p>Le point de départ était Brave. L'idée d'un navigateur qui supprime entièrement la publicité — non pas comme une fonctionnalité, mais comme un engagement structurel — avait du sens pour moi avant même que j'aie le vocabulaire pour expliquer pourquoi. J'avais passé des années à être confus et induit en erreur par des informations façonnées par des intérêts commerciaux que je ne pouvais pas voir. La publicité n'est pas une diffusion neutre. C'est un filtre sur ce qui vous parvient et sur la façon dont c'est présenté. Je ne voulais pas construire par-dessus cette structure.</p>

<div class="pull">La question n'était pas : cela devrait-il être web3 ? La question était : quelle architecture rend impossible à une autorité centrale de contrôler ce que les gens apprennent ? Le web3 n'était pas une tendance que j'ai suivie. C'était la réponse à une question avec laquelle je vivais déjà.</div>

<p>La distribution n'est pas une préférence technique. C'est la seule architecture qui ne peut pas être capturée. Une plateforme centralisée peut être mise sous pression, achetée ou fermée. Une plateforme distribuée ne peut appartenir à personne — ce qui signifie qu'elle ne peut pas être retournée contre ceux qui l'utilisent.</p>

<p>Cela importe ici parce que cipher.learn porte des informations que certaines institutions préféreraient garder inaccessibles — non pas parce qu'elles sont dangereuses, mais parce qu'une éducation technique accessible change qui peut participer aux conversations techniques. Les articles que j'ai choisis sont publics. Les connexions entre eux ne sont pas enseignées. Cet écart est maintenu par le coût, par la langue, par les exigences de diplôme. J'essaie de le combler sous une forme qui ne peut pas être refermée.</p>

<p>Vers 2020, quelque chose a rendu cela concret. Pendant la période COVID, un certain nombre de personnes au Japon qui détenaient des quantités importantes de cryptomonnaies ont été arrêtées. J'ai observé cela se produire. L'anxiété que cela a produite en moi était spécifique : au Japon, construire quelque chose orienté autour de la pensée web3 n'était pas seulement financièrement compliqué — cela comportait un risque juridique croissant. L'exposition était réelle, et elle devenait de plus en plus visible.</p>

<p>À partir de ce moment, j'ai commencé à réfléchir sérieusement au pays d'origine de Hawking. L'Angleterre. Wimbledon. Cela peut sembler une connexion étrange, mais le raisonnement était direct : le COVID avait éliminé les déplacements, et je réfléchissais à ce que pourrait être un outil post-COVID. J'ai envisagé de construire une application de coaching tennistique — Wimbledon comme ancre conceptuelle, l'analyse du mouvement comme problème technique. Je l'ai esquissée. Modélisation anatomique, analyse de la posture des joueurs, données sur les conditions de service, intégration des règles. Puis je me suis arrêté. La raison était précise : l'application que j'imaginais aurait nécessité une collecte continue de données corporelles, la détection d'images et le suivi des mouvements. L'environnement réglementaire européen en matière de données — le RGPD et l'infrastructure de détection qui l'entoure — signifiait que tout déploiement vers des utilisateurs européens entrerait immédiatement dans un régime d'obligations de conformité que je ne pouvais pas satisfaire depuis ma position. Je l'ai abandonné.</p>

<p>Mais cet échec était clarificateur. Ce que j'avais conçu était un outil centralisé de collecte de données. L'application de coaching aurait eu besoin d'un serveur pour héberger les modèles, les images, les données utilisateurs. Chaque fonctionnalité que je voulais ajouter nécessitait de tirer davantage d'informations. J'ai réalisé que je pensais dans la seule architecture qu'on m'avait appris à utiliser — centralisée, accumulatrice de données, plateforme comme intermédiaire. Et j'ai constaté que je ne pouvais pas l'accepter.</p>

<div class="pull">L'intuition de Brave ne concernait pas seulement la publicité. Elle portait sur les pays auxquels on peut faire confiance avec quelles informations, et sur le fait de rendre cette distinction visible plutôt que cachée. J'ai appliqué cette même logique à la sélection des langues pour cette plateforme — en choisissant des langues issues de cultures et de juridictions en lesquelles j'avais des raisons de faire confiance, plutôt que de viser une couverture maximale.</div>

<p>La distinction entre version gratuite et version complète vient de cette même réflexion. Le choix entre gratuit et complet n'est pas une décision commerciale déguisée en décision de conception. C'est un vrai choix architectural : quelle part de la logique réside sur un serveur, et quelle part reste dans le fichier. La version complète — animation 3D, calcul de graphes en direct, physique orbitale — nécessite un calcul côté serveur. C'est une vraie dépendance. La version gratuite l'évite entièrement. Les deux contiennent la même information. La différence réside dans le fait que le rendu de cette information nécessite ou non de faire confiance à une machine que j'exploite.</p>

<p>Une dernière chose : il y a dix ans, l'outil que j'essayais de construire était une application de suivi oculaire. C'était pour moi-même. J'ai des difficultés avec la lecture soutenue dans certaines conditions, et je voulais quelque chose qui puisse s'adapter à l'endroit où mon attention se trouvait réellement, plutôt qu'à l'endroit où une page supposait qu'elle serait. Je ne l'ai pas terminé. L'infrastructure technique n'était pas disponible pour moi à l'époque sous une forme que je pouvais déployer seul. Mais le problème qu'il essayait de résoudre — comment rendre l'information accessible à quelqu'un dont le schéma d'accès ne correspond pas au schéma par défaut — est le même problème que cipher.learn essaie de résoudre. L'outil de suivi oculaire était la première version de ceci. Je ne le savais pas encore.</p>

<p>Questo lavoro — cipher.learn, le visualizzazioni, gli articoli, tutto quanto — esiste perché non avevo altro modo per dimostrare ciò che so. La pubblicazione accademica richiede un'affiliazione istituzionale. Non ce l'ho. Questa è l'unica forma che mi era accessibile, e l'ho resa il più rigorosa possibile.</p>

<p>Ma prima di concludere, voglio dire qualcosa su da dove viene tutto questo. Non gli algoritmi. Le condizioni che hanno reso possibili gli algoritmi.</p>

<div class="pull">Mia madre ha deciso di farmi registrare nell'ambito del sistema di assistenza sociale giapponese per persone con disabilità. So perché l'ha fatto. Ero lì. L'ho guardata rifletterci per anni.</div>

<p>Non aveva torto nel farlo. Si muoveva in una società che lascia pochissimo spazio alle persone che non rientrano nelle sue categorie, e cercava di proteggermi dagli aspetti di quella società che mi avrebbero fatto più danni. La classificazione mi ha permesso di lavorare all'interno della struttura del nucleo familiare dipendente — di avere tempo, di leggere, di costruire tutto questo. Senza di essa, nulla di tutto questo esiste.</p>

<p>Ho sentito le argomentazioni su quanto quella decisione mi sia costata. La classificazione come persona con disabilità restringe i percorsi lavorativi che dovrebbero essermi aperti — non perché le mie capacità siano limitate, ma perché l'etichetta cambia il modo in cui le istituzioni mi percepiscono prima ancora che io apra bocca. Lo so. L'ho vissuto.</p>

<p>Ma non sono arrabbiato con lei. Voglio dirlo chiaramente, perché penso che le persone si aspettino che lo sia.</p>

<div class="pull">Ha preso una decisione all'interno di un sistema che aveva già preso decisioni su di lei. Non era libera quando l'ha presa. Il Giappone che stava attraversando era un Giappone con le proprie categorie per le donne, per le madri, per le persone che facevano le domande sbagliate. È diventata ciò che quel sistema richiedeva da lei, e poi ha cercato di usare ciò che quel sistema offriva per impedire che io ne venissi consumato.</div>

<p>Non è un fallimento. È qualcuno che cerca di sopravvivere a una struttura che non ha costruito, e che cerca di portare con sé qualcuno che ama.</p>

<p>Ho trascorso molto tempo con questi articoli — Baran, Lamport, Shamir, Merkle, Rabin, Back, Nakamoto, Buterin. Quello che condividono è un problema comune: come si costruisce qualcosa che funzioni senza un centro di fiducia? Come si crea un sistema che non dipenda da nessuna singola autorità per tenersi insieme?</p>

<p>Penso a quella domanda in modo diverso ora. Non è solo una domanda tecnica. È la domanda con cui viveva mia madre. Come si protegge qualcuno quando le istituzioni che dovrebbero proteggere le persone sono le stesse che le categorizzeranno, le limiteranno, le instraderanno lontano da ciò che avrebbero potuto diventare?</p>

<p>La sua risposta era imperfetta. La maggior parte delle risposte a quella domanda lo sono. Ma era una risposta costruita a partire dalle opzioni che aveva realmente, non dalle opzioni che avrebbero dovuto esistere.</p>

<div class="pull">La rispetto per questo. Non nonostante il costo. La rispetto includendo il costo, perché ora capisco con cosa stava lavorando.</div>

<p>Prima di descrivere dove questo porta, voglio spiegare perché è stato costruito nel modo in cui è stato costruito.</p>

<p>Cinque o sei anni fa ho guardato le lezioni MIT 6.824 sui sistemi distribuiti su YouTube. Fu quello il momento in cui qualcosa si spostò. Avevo letto di sicurezza, di architettura dell'informazione, di come i sistemi falliscono. Le lezioni resero visibile la struttura. Cominciai a raccogliere materiale sui sistemi distribuiti — cosa significa distribuzione, come è emersa, dove porta. È da lì che viene l'inquadramento web3.</p>

<p>Il punto di partenza era Brave. L'idea di un browser che elimina completamente la pubblicità — non come funzionalità, ma come impegno strutturale — aveva senso per me prima ancora che avessi il vocabolario per spiegare perché. Avevo trascorso anni a essere confuso e fuorviato da informazioni plasmate da interessi commerciali che non riuscivo a vedere. La pubblicità non è una consegna neutrale. È un filtro su ciò che ti raggiunge e su come viene inquadrato. Non volevo costruire sopra quella struttura.</p>

<div class="pull">La domanda non era: dovrebbe essere web3? La domanda era: quale architettura rende impossibile a un'autorità centrale controllare ciò che le persone imparano? Il web3 non era una tendenza che seguivo. Era la risposta a una domanda con cui già convivevo.</div>

<p>La distribuzione non è una preferenza tecnica. È l'unica architettura che non può essere catturata. Una piattaforma centralizzata può essere pressata, acquistata o spenta. Una distribuita non può appartenere a nessuno — il che significa che non può essere usata contro le persone che la utilizzano.</p>

<p>Questo conta qui perché cipher.learn porta informazioni che alcune istituzioni preferirebbero rimanessero inaccessibili — non perché siano pericolose, ma perché un'istruzione tecnica accessibile cambia chi può partecipare alle conversazioni tecniche. Gli articoli che ho scelto sono pubblici. Le connessioni tra di essi non vengono insegnate. Quel divario è mantenuto dal costo, dalla lingua, dai requisiti di credenziali. Sto cercando di colmarlo in una forma che non possa essere richiusa.</p>

<p>Intorno al 2020, qualcosa rese tutto questo concreto. Durante il periodo COVID, in Giappone un certo numero di persone che detenevano quantità significative di criptovalute furono arrestate. L'ho visto accadere. L'ansia che questo produsse in me era specifica: in Giappone, costruire qualcosa orientato attorno al pensiero web3 non era solo finanziariamente complicato — comportava un rischio legale crescente. L'esposizione era reale e stava diventando sempre più visibile.</p>

<p>Da quel momento cominciai a pensare seriamente al paese d'origine di Hawking. L'Inghilterra. Wimbledon. Sembra una connessione strana, ma il ragionamento era diretto: il COVID aveva eliminato i movimenti, e stavo pensando a come potrebbe essere uno strumento post-COVID. Considerai di costruire un'applicazione di coaching tennistico — Wimbledon come ancoraggio concettuale, l'analisi del movimento come problema tecnico. La abbozzai. Modellazione anatomica, analisi della postura dei giocatori, input delle condizioni di servizio, integrazione delle regole. Poi mi fermai. Il motivo era specifico: l'applicazione che stavo immaginando avrebbe richiesto la raccolta continua di dati corporei, il rilevamento di immagini e il tracciamento dei movimenti. L'ambiente regolatorio europeo per i dati — il GDPR e l'infrastruttura di rilevamento che vi ruota attorno — significava che qualsiasi distribuzione verso utenti europei sarebbe entrata immediatamente in un regime di obblighi di conformità che non potevo soddisfare dalla mia posizione. Lo abbandonai.</p>

<p>Ma quel fallimento fu chiarificatore. Quello che avevo progettato era uno strumento centralizzato di raccolta dati. L'app di coaching avrebbe avuto bisogno di un server per contenere i modelli, le immagini, i dati degli utenti. Ogni funzionalità che volevo aggiungere richiedeva di attirare più informazioni. Mi resi conto che stavo pensando nell'unica architettura che mi era stata insegnata — centralizzata, accumulatrice di dati, piattaforma come intermediario. E scoprii che non potevo accettarla.</p>

<div class="pull">L'intuizione di Brave non riguardava solo la pubblicità. Riguardava quali paesi ci si può fidare con quali informazioni, e rendere quella distinzione visibile anziché nascosta. Applicai la stessa logica alla selezione delle lingue per questa piattaforma — scegliendo lingue da culture e giurisdizioni che avevo ragioni di fidarmi, piuttosto che puntare alla massima copertura.</div>

<p>La divisione tra versione gratuita e completa deriva dallo stesso pensiero. La scelta tra gratuito e completo non è una decisione commerciale travestita da decisione di design. È una vera scelta architettonica: quanta logica risiede su un server, e quanta rimane nel file. La versione completa — animazione 3D, calcolo di grafi in tempo reale, fisica orbitale — richiede il calcolo lato server. Questa è una dipendenza reale. La versione gratuita la evita completamente. Entrambe contengono le stesse informazioni. La differenza è se il rendering di quelle informazioni richiede di fidarsi di una macchina che gestisco.</p>

<p>Un'ultima cosa: dieci anni fa, lo strumento che cercavo di costruire era un'applicazione di eye-tracking. Era per me stesso. Ho difficoltà con la lettura prolungata in certe condizioni, e volevo qualcosa che potesse adattarsi a dove si trovava effettivamente la mia attenzione, piuttosto che a dove una pagina presumeva che fosse. Non l'ho finito. L'infrastruttura tecnica non era disponibile per me all'epoca in una forma che potessi distribuire da solo. Ma il problema che cercava di risolvere — come si rende l'informazione accessibile a qualcuno il cui schema di accesso non corrisponde al default — è lo stesso problema che cipher.learn cerca di risolvere. Lo strumento di eye-tracking era la prima versione di tutto questo. Non lo sapevo ancora.</p>

<p>Sulla questione dei costi e della giurisdizione: l'attuale struttura fiscale in Giappone assoggetta i redditi legati alle criptovalute e al web3 all'imposta sul reddito generale — un'aliquota combinata che raggiunge il 55% per i redditi più alti. Rapporti del 2024 e 2025 indicano un passaggio verso un'imposta separata sulle plusvalenze al 20% a partire dal 2028. Questo viene presentato come una semplificazione. Non è una riduzione dell'onere reale. Il debito fiscale si accumula su più eventi: conversione, scambio, premi di staking e cessione attivano ciascuno valutazioni separate. Un individuo che detiene e utilizza questi asset per gli scopi che descrivo si trova di fronte a obblighi cumulativi che non scompaiono con un'aliquota nominale modificata. La realtà strutturale per i detentori individuali è diversa da quella degli operatori di piattaforme registrati, che hanno accesso a strutture legali che riducono la responsabilità effettiva. La cifra del 20% sarà accurata per alcune transazioni. Per il modello di utilizzo che sto descrivendo, non ridurrà l'onere complessivo in modo significativo.</p>

<p>Non sto facendo un argomento sulla politica fiscale. Sto notando che l'architettura che ho scelto — distribuita, non-custodiale, non dipendente da un operatore finanziario giapponese registrato — non è accessoria al progetto. È il progetto.</p>

<p>C'è ancora una cosa che voglio dire prima di descrivere dove questo porta.</p>

<p>Hawking è qualcuno che rispetto profondamente. Trovarlo non è stato un caso. Intorno al 2008, qualcosa che disse mi fermò completamente. Non so come descriverlo altrimenti — fu la prima volta che incontrai parole che funzionavano come una mappa. Non istruzioni. Non spiegazioni. Una mappa: qualcosa che ti mostrava dove eri, quanto distanti erano le cose le une dalle altre, e come muoversi tra di esse.</p>

<p>Quando morì nel 2018, fui sinceramente scosso. Più di quanto mi aspettassi.</p>

<div class="pull">Le sue parole costruirono una geografia nella mia mente. La distanza — come misurarla, come tenerla, come lavorarci invece che contro di essa. Da allora navigo con quella mappa. Ciò che ho costruito qui è ciò che succede quando si segue una mappa con sufficiente serietà.</div>

<p>Penso ai suoi articoli originali come a prime edizioni nel senso più autentico — non divulgazione scientifica, non traduzione, ma la forma pura del pensiero prima che fosse reso digeribile per qualcun altro. È così che ho cercato di trattare gli articoli in questo progetto. Non come materiale da riassumere, ma come strutture da comprendere nei propri termini.</p>

<p>Mi ha mostrato che il modo in cui si descrive un sistema cambia ciò che il sistema può fare. La precisione nel linguaggio non è pedanteria. È la differenza tra una mappa e una decorazione.</p>

<p>Quando questa struttura sarà completa — quando cipher.learn sarà finito nella forma verso cui sto costruendo — ho intenzione di andare a Cambridge e lasciare qualcosa al suo memoriale. Non come gesto. Come testimonianza. È questo ciò che ha prodotto il seguire la mappa. Sto costruendo questo per avere qualcosa che valga la pena portare.</p>

<p>Sto costruendo questo perché voglio incontrarlo. Se n'è andato. Quindi l'incontro è il lavoro stesso.</p>

<p>In futuro, ho intenzione di lavorare in Europa e altrove — usando l'istruzione tecnica, gli strumenti di visualizzazione e tutto ciò che ho costruito qui per assistere persone che lavorano al limite di ciò che i loro sistemi permettono. Non perché l'Europa sia perfetta. Perché la distanza a volte rende possibile lavorare.</p>

<p>Questa pagina segna la fine di cipher.learn. È anche la cosa più onesta che ho scritto qui. Volevo che qualcuno che trovasse questo — ovunque si trovi, in qualunque lingua legga — conoscesse la forma completa di ciò che è.</p>

<p>Per una comprensione più approfondita delle origini e della struttura di questo progetto, puoi anche esplorare la piattaforma correlata qui: <a href="https://shokk1509-prog.github.io/cifra-free/" target="_blank">https://shokk1509-prog.github.io/cifra-free/</a>.</p>

<p>Quella piattaforma continua la stessa filosofia, mostrando:</p>
<ul>
  <li>Come ho incontrato Hawking per la prima volta e l'influenza di quell'esperienza.</li>
  <li>Le intenzioni dietro i riferimenti specifici al Québec.</li>
  <li>Approfondimenti sulla distribuzione dell'informazione (dispersio) e la struttura educativa.</li>
</ul>

<p>Hann sýndi mér að leiðin sem maður lýsir kerfi breytir því hvað kerfið getur gert. Nákvæmni í máli er ekki smásmygli. Það er munurinn á korti og skraut.</p>

<p>Þegar þessi uppbygging er fullkomin — þegar cipher.learn er tilbúið í þeirri mynd sem ég er að byggja í átt að — ætla ég að fara til Cambridge og skilja eftir eitthvað við minnisvarða hans. Ekki sem táknræna athöfn. Sem skrá. Þetta er hvað það að fylgja kortinu hefur framleitt. Ég er að byggja þetta til að eiga eitthvað sem þess virði að koma með.</p>

<p>Til að fá dýpri skilning á uppruna og uppbyggingu þessa verkefnis geturðu einnig skoðað tengdan vettvang hér: <a href="https://shokk1509-prog.github.io/cifra-free/" target="_blank">https://shokk1509-prog.github.io/cifra-free/</a>.</p>

<p>Aquest treball — cipher.learn, les visualitzacions, els articles, tot plegat — existeix perquè no tenia cap altra manera de demostrar el que sé. La publicació acadèmica requereix una afiliació institucional. No en tinc cap. Aquesta és l'única forma que m'era accessible, i l'he feta tan rigorosa com he pogut.</p>

<div class="pull">La respecto per això. No malgrat el cost. La respecto incloent el cost, perquè ara entenc amb què estava treballant.</div>

<p>Abans de descriure cap on va tot això, vull explicar per què va ser construït de la manera en què va ser construït.</p>

<p>Fa cinc o sis anys vaig veure les classes MIT 6.824 sobre sistemes distribuïts a YouTube. Va ser en aquell moment quan alguna cosa va canviar. Havia estat llegint sobre seguretat, sobre arquitectura de la informació, sobre com fallen els sistemes. Les classes van fer visible l'estructura. Vaig començar a recopilar material sobre sistemes distribuïts — què significa la distribució, com va sorgir, cap on condueix. D'aquí va venir l'enfocament web3.</p>

<p>El punt de partida va ser Brave. La idea d'un navegador que elimina completament la publicitat — no com a funcionalitat, sinó com a compromís estructural — tenia sentit per a mi abans de tenir el vocabulari per explicar per què. Havia passat anys sent confós i enganyat per informació modelada per interessos comercials que no podia veure. La publicitat no és un lliurament neutral. És un filtre sobre allò que t'arriba i com és emmarcat. No volia construir sobre aquella estructura.</p>

<p>La distribució no és una preferència tècnica. És l'única arquitectura que no pot ser capturada. Una plataforma centralitzada pot ser pressionada, comprada o tancada. Una de distribuïda no pot pertànyer a ningú — la qual cosa significa que no pot ser usada en contra de les persones que la utilitzen.</p>

<p>Això importa aquí perquè cipher.learn porta informació que algunes institucions preferirien que romangués inaccessible — no perquè sigui perillosa, sinó perquè l'educació tècnica accessible canvia qui pot participar en les converses tècniques. Els articles que he escollit són públics. Les connexions entre ells no s'ensenyen. Aquesta bretxa es manté pel cost, per la llengua, pels requisits de credencials. Estic intentant tancar-la en una forma que no pugui ser tancada de nou.</p>

<p>Però aquell fracàs va ser aclaridor. El que havia dissenyat era una eina centralitzada de recollida de dades. L'aplicació d'entrenament hauria necessitat un servidor per emmagatzemar els models, les imatges, les dades dels usuaris. Cada funcionalitat que volia afegir requeria atreure més informació. Em vaig adonar que estava pensant en l'única arquitectura que m'havien ensenyat a usar — centralitzada, acumuladora de dades, plataforma com a intermediari. I vaig descobrir que no podia acceptar-la.</p>

<p>Una cosa més: fa deu anys, l'eina que intentava construir era una aplicació de seguiment ocular. Era per a mi mateix. Tinc dificultats amb la lectura prolongada en certes condicions, i volia alguna cosa que pogués adaptar-se a on estava realment la meva atenció, en lloc d'on una pàgina assumia que estaria. No la vaig acabar. La infraestructura tècnica no estava disponible per a mi en aquell moment en una forma que pogués desplegar sol. Però el problema que intentava resoldre — com es fa que la informació sigui accessible per a algú el patró d'accés del qual no coincideix amb el predeterminat — és el mateix problema que cipher.learn intenta resoldre. L'eina de seguiment ocular va ser la primera versió d'això. Encara no ho sabia.</p>

<p>Mas abans de concluire, vòli dire quicòm sus d'ont ven tot aquò verament. Pas los algoritmes. Las condicions que an fait los algoritmes possibles.</p>

<div class="pull">Ma maire a decidit de me faire classificar dins lo sistèma japonés d'assisténcia sociala per las personas amb handicap. Sabi perque o a fait. I èri. L'ai vista pensar-i durant d'annadas.</div>

<p>Aviá pas tort de far-o. Se movia dins una societat que laissa pauc d'espaci als gens que s'adaptan pas a sas categorias, e assajava de me protegir dels aspèctes d'aquela societat que m'aurian causit lo mai de dòl. La classificacion m'a permés de trabalhar dins l'estructura del foguièr dependent — d'aver del temps, de legir, de bastir aquò. Sens aquò, rèn d'aquò existís.</p>

<p>Ai ausit los arguments sus çò que aquela decision m'a costat. La classificacion per handicap estreche los caminhs d'emplegue que son censats èsser dubèrts per ieu — pas perque mas capacitats sián limitadas, mas perque l'etiqueta cambia cossí las institucions me percèbon abans que parle. O sabi. L'ai viscut.</p>

<p>Mas sièu pas en colèra contra ela. Vòli o dire clarament, perque pensi que las gens s'espèran que o sièu.</p>

<div class="pull">A pres una decision dins un sistèma que aviá ja pres decisions sus ela. Èra pas liura quand o a fait. Lo Japon qu'ela navegava èra un Japon amb sas pròprias categorias per las femnas, per las maires, per las gens que fasián las questions erronèas. Es devenguda çò que aqueste sistèma li demandava, e puèi a assajat d'utilizar çò qu'aqueste sistèma ofriá per m'empachar d'èsser consumit per el.</div>

<p>Aquò es pas un fracàs. Aquò es quauqu'un que assaja de sobreviure a una estructura qu'a pas bastida, e qu'assaja de portar amb el quauqu'un qu'ama.</p>

<p>Ai passat fòrça temps amb aqueles articles — Baran, Lamport, Shamir, Merkle, Rabin, Back, Nakamoto, Buterin. Çò qu'an en comun es un problèma comun: cossí basta quicòm que foncciona sens un centre de confiança? Cossí se dissenha un sistèma que depende pas d'aucuna autoritat sola per se maintenir?</p>

<p>Pensi ara a aquela question d'una manièra diferenta. Es pas solament una question tecnica. Es la question amb la quala ma maire vivèva. Cossí se protegís quauqu'un quand las institucions que son censadas protegir las gens son las mèmas que las categorizaran, las limitaran, las desviarán de çò qu'aurian pogut devenir?</p>

<p>Sa responsa èra imperfècta. La maioria de las responsas a aquela question o son. Mas èra una responsa bastida a partir de las opcions qu'aviá verament, pas de las opcions que cauriá aver existidas.</p>

<div class="pull">La respècti per aquò. Pas malgrat lo còst. La respècti en incloent lo còst, perque compreni ara amb çò qu'ela trabalhaval.</div>

<p>Abans de descriure cap ont vai aquò, vòli explicar perque a estat bastit de la manièra en qu'a estat bastit.</p>

<p>Fa cinc o sièis ans ai vist las lèçons MIT 6.824 sus los sistèmas distribuïts sus YouTube. Aquò es lo moment ont quicòm a bascular. Aviái legit sus la seguretat, sus l'arquitectura de l'informacion, sus cossí los sistèmas fracassan. Las lèçons an fait l'estructura visibla. Ai començat a recolhir material sus los sistèmas distribuïts — çò que significa la distribucion, cossí es emergida, cap ont mena. D'aquí ven l'encadrament web3.</p>

<p>Lo punt de partença èra Brave. L'idèa d'un navigador que suprimís completament la publicitat — pas coma una fonccionalitat, mas coma un engagement estructural — aviá sens per ieu abans d'aver lo vocabulari per explicar perque. Aviái passat d'annadas a èsser confondut e induit en error per d'informacion formada per d'interèsses comercials que podiái pas veire. La publicitat es pas una liurason neutra. Es un filtre sus çò que t'arriba e cossí es encastrat. Voliái pas bastir sus aquela estructura.</p>

<div class="pull">La question èra pas: aquò deuriá èsser web3? La question èra: quina arquitectura fa impossible a una autoritat centrala de controlar çò que las gens aprenon? Lo web3 èra pas una tendéncia que seguissiái. Èra la responsa a una question amb la quala vivèvi ja.</div>

<p>La distribucion es pas una preferéncia tecnica. Es la sola arquitectura que pòt pas èsser capturada. Una plataforma centralizada pòt èsser pressionada, achetada o tancada. Una distribuïda pòt pas appartenir a degun — çò que significa qu'es pas possible de l'utilizar contra los gens que l'utilízan.</p>

<p>Aquò importa aquí perque cipher.learn pòrta d'informacion que certanas institucions preferirian que demorèsse inaccessibla — pas perque siá perillosa, mas perque l'educacion tecnica accessibla cambia qui pòt participar a las conversacions tecnicas. Los articles qu'ai causits son publics. Las connexions entre els son pas ensenhaladas. Aquela fissura es mantenguda pel còst, per la lenga, pels requisits de credencials. Assaji de la tampar dins una forma que pòt pas èsser tancada de nòu.</p>

<p>Cap al 2020, quicòm a fait aquò concret. Durant lo periòde COVID, al Japon un nombre de personas qu'aviàn de quantitats significativas de criptomonedas foguèron arrestadas. L'ai vist s'acontir. L'ansieutat que aquò a produsit en ieu èra especifica: al Japon, bastir quicòm orientat entorn de la pensada web3 èra pas solament financièrament complicat — portava un risc juridic creissent. L'exposicion èra reala e deveniva de mai en mai visibla.</p>

<p>D'aqueste moment ai començat a pensar seriosament al país d'origina de Hawking. Anglatèrra. Wimbledon. Sembla una connexion estrangièra, mas lo raïsonament èra dirècte: lo COVID aviá eliminat los desplaçaments, e pensiái a cossí un aisina post-COVID poiriá semblar. Ai considerat de bastir una aplicacion d'entrenament de tenis — Wimbledon coma ancre conceptual, l'analisi del movement coma problèma tecnic. L'ai esboçat. Modelizacion anatomica, analisi de la postura dels jogaires, entradas de condicions de servici, integracion de règlas. Puèi m'ai arrestat. La rason èra especifica: l'aplicacion que m'imaginavi auriá requerit una recòlta continua de donadas corporalas, la deteccion d'imatges e lo seguiment dels movements. L'entorn regulatòri europèu de las donadas — lo RGPD e l'infrastructura de deteccion qu'o enròda — significava que tota implementacion cap als utilizaires europèus intrariá immediadament dins un regim d'obligacions de conformitat que podiái pas satisfar dempuèi ma posicion. L'ai abandonat.</p>

<p>Mas aqueste fracàs èra clarificant. Çò qu'aviái dissenhada èra un aisina centralizat de recòlta de donadas. L'aplicacion d'entrenament auriá agut besonh d'un servidor per gardar los modèls, las imatges, las donadas dels utilizaires. Cada fonccionalitat qu'aviái volgut apondre requerissiá de tirar mai d'informacion. Me sièu aperiçoput que pensiái dins la sola arquitectura qu'om m'aviá apresa d'utilizar — centralizada, acumulatrice de donadas, plataforma coma intermediari. E ai descobèrt que podiái pas l'acceptar.</p>

<div class="pull">L'intuicion de Brave concernissiá pas solament la publicitat. Concernissiá quins país se pòt far confiança amb quina informacion, e rendre aquela distincion visibla en luòc d'amagada. Ai aplicat aquela mèma logica a la seleccion de lengas per aquesta plataforma — en causint de lengas de culturas e jurisdiccions en las qualas aviái de rasons de far confiança, en luòc de cercar una cobèrtura maximala.</div>

<p>La division entre version gratuïta e completa ven de la mèma pensada. Lo causiment entre gratuit e complet es pas una decision comerciala deguisada en decision de dissenhament. Es un veritable causiment arquitectural: quanta logica se tròba sus un servidor, e quanta dèmora dins lo fichièr. La version completa — animacion 3D, calcul de grafes en viu, fisica orbitala — requerís un calcul del costat del servidor. Aquò es una dependéncia reala. La version gratuïta l'evita completament. Las doas contènon la mèma informacion. La diferéncia es se lo rendatge d'aquela informacion requerís de far confiança a una maquina qu'opèri.</p>

<p>Una causa encara: fa dètz ans, l'aisina qu'assajavi de bastir èra una aplicacion de seguiment ocular. Èra per ieu mèime. Ai de dificultats amb la lectura prolongada en certas condicions, e voliái quicòm que poguèsse s'adaptar a ont èra verament mon atencion, en luòc d'ont una pagina suposava qu'èra. L'ai pas acabada. L'infrastructura tecnica m'èra pas disponibla a l'epòca dins una forma que podiái desplejar sol. Mas lo problèma qu'assajava de resòlver — cossí se fa l'informacion accessibla per quauqu'un dont lo modèl d'accès correspond pas al defaut — es lo mèime problèma que cipher.learn assaja de resòlver. L'aisina de seguiment ocular èra la primièra version d'aquò. O sabiái pas encara.</p>

<p>Sus la question del còst e de la jurisdiccion: l'estructura fiscala actuala al Japon soptamete los revenuts ligats a las criptomonedas e al web3 a l'impòst general sus lo revengut — un taus combinat que pòt atendre 55% per los revenuts mai alhuts. Rapòrts de 2024 e 2025 indican una transicion cap a un impòst separat sus las plusvalenças a taus pla de 20% a partir de 2028. Aquò es presentat coma una simplificacion. Es pas una reduccion de la carga reala. La dèbta fiscala s'acumula sus mai d'eveniments: la conversion, l'escambi, las recompensas de staking e l'alienacion declenchan cadun d'evaluacions separadas. Un individú que deté e utiliza aqueles actius per los fins que descrivi es confrontat a d'obligacions cumulativas que disparèisson pas amb un taus nominal modificat. La realitat estructurala per los detenents individuals es diferenta d'aquela dels operaires de plataformas registradas, qu'an accès a d'estructuras juridicas que reduison la responsabilitat efectiva. Lo chifra de 20% serà exacte per certas transaccions. Per lo modèl d'utilizacion que descrivi, reduirà pas la carga globala d'una manièra significativa.</p>

<p>Fau pas un argument sus la politica fiscala. Nòti qu'l'arquitectura qu'ai causissida — distribuïda, non-custodial, que depende pas d'un operaire finançier japonés registrat — es pas accessòria al projècte. Es lo projècte.</p>

<p>I a encara una causa que vòli dire abans de descriure cap ont vai aquò.</p>

<p>Hawking es quauqu'un que respècti fondament. Lo trobar èra pas un accident. Cap al 2008, quicòm qu'a dich m'a arrestat completament. Sabi pas cossí o descriure d'una autra manièra — èra la primièra còp que me trobèri amb de mots que fonccionalavan coma una mapa. Pas d'instruccions. Pas d'explicacions. Una mapa: quicòm que te mostrava ont èras, quant luènh èran las causas unas de las autras, e cossí se desplaçar entre elas.</p>

<p>Quand es mòrt en 2018, siá estat verament esbaladit. Mai que m'espèrava.</p>

<div class="pull">Sos mots an bastit una geografia dins mon esperit. La distança — cossí la mesurar, cossí la tenir, cossí trabalhar amb ela en luòc de contra ela. Me sièu guidat sus aquela mapa dempuèi alara. Çò qu'ai bastit aquí es çò qu'arriba quand se seguís una mapa prou seriosament.</div>

<p>Pensi a sos articles originals coma a primièras edicions dins lo sens mai veritable — pas de sciéncia populara, pas de traduccion, mas la forma pura de la pensada abans qu'èra renduda palatibla per quauqu'un d'autre. Aquò es cossí ai assajat de tractar los articles dins aqueste projècte. Pas coma material a resumir, mas coma estructuras a comprendre dins lors pròpris tèrmes.</p>

<p>M'a mostrat que la manièra de descriure un sistèma cambia çò que lo sistèma pòt far. La precision dins la lenga es pas de la pedantariá. Es la diferéncia entre una mapa e una decoracion.</p>

<p>Quand aquesta estructura serà completa — quand cipher.learn serà acabat dins la forma cap a la quala basti — ai l'intencion d'anar a Cambridge e de laissar quicòm a son memorial. Pas coma un gèst. Coma un registre. Aquò es çò que seguir la mapa a produsit. Basti aquò per aver quicòm que val la pena de portar.</p>

<p>Basti aquò perque vòli lo rencontrar. Es partis. Doncas la rencontra es lo trabalh mèime.</p>

<p>D'aquí enlà, ai l'intencion de trabalhar en Euròpa e alhors — en utilizant l'educacion tecnica, los aisinas de visualizacion e tot çò qu'ai bastit aquí per assistir las personas que trabalhan a la frontièra de çò que lors sistèmas permèton. Pas perque l'Euròpa siá perfècta. Perque la distança fa quauquefòi possibla de trabalhar.</p>

<p>Aquesta pagina marca la fin de cipher.learn. Es tanben la causa mai onèsta qu'ai escricha aquí. Voliái que quauqu'un que trobèsse aquò — ont que siá, en quala lenga que lèga — conegués la forma completa de çò qu'es.</p>

<p>Per una comprension mai profonda de las originas e de l'estructura d'aqueste projècte, podètz tanben explorar la plataforma ligada aquí: <a href="https://shokk1509-prog.github.io/cifra-free/" target="_blank">https://shokk1509-prog.github.io/cifra-free/</a>.</p>

<p>Aquela plataforma continua la mèma filosofia, en mostrant:</p>
<ul>
  <li>Cossí ai rencontrat Hawking per la primièra còp e l'influéncia d'aquela experiéncia.</li>
  <li>Las intencions darrièr las referéncias especificas al Québec.</li>
  <li>Perspectivas sus la distribucion de l'informacion (dispersio) e l'estructura educativa.</li>
</ul>

<p>Servís coma espaci complementari a cipher.learn, en donant als lectors una imatge mai completa de las idèas, del contèxte e dels principis estructurals darrièr aqueste trabalh.</p>
  `,

<p>Al labour-mañ — cipher.learn, ar skinadurioù, ar pennadoù, an holl — a zo dre ma n'em boa ket tu all da ziskouez ar pezh a ouzon. Embannadur akademek a c'houlenn ur c'henglotadur stummadel. N'em eus ket unan. Setu ar stumm nemetañ a oa digor din, hag em eus great anezhañ ken strizh ha m'am eus c'hallaouet.</p>

<p>Met a-raok klozañ, me a fell din lavaret un dra bennak diwar-benn eus pelec'h e teu ar pezh-mañ en gwirionez. Ket an algoritmoù. Ar reoù a oa bet ret evit ar pezh ma 'z eus bet an algoritmoù possibel.</p>

<div class="pull">Ma mamm a reze d'am enrollañ e rummad reizhiad sikour sokial Japan evit tud handicapet. Gouzout a ran perak en deus graet. Eno e oann. Me am boa gwelet oc'h stummañ e spered hed bloavezhioù.</div>

<p>N'oa ket fazi ganti d'ober evel-se. E kerzh eo bet dre ur gevredigezh a ro nebeut a lec'h d'an dud n'int ket o klotañ gant he rummadoù, ha klasket en deus ma difenn eus an doareoù eus ar gevredigezh-se a vije bet ar re skañvañ din. Ar rummadegezh a roe din tu da labourat a-barzh stumm an ti boutin — da gaout amzer, da lenn, da sevel ar pezh-mañ. Hep an dra-se, netra eus an dra-mañ a zo.</p>

<p>Klevet em eus ar rezonioù diwar-benn ar pezh m'en deus kostaet din an divizout-se. Ar rummadegezh handicap a strinkañ an hentoù labour a dlefe bezañ digor din — ket dre ma z'eo ma c'halvegezhioù bevennet, met dre ma z'eo ar labellenn o cheñch penaos e weler ac'hanon gant ar stummadoù a-raok ma komzan. Gouzout a ran an dra-se. Bevet em eus an dra-se.</p>

<p>Met n'on ket kounnar ouzhi. Me a fell din lavaret an dra-se sklaer, dre ma soñjan e fell d'an dud din bezañ kounnar.</p>

<div class="pull">Ur divizout a reas a-barzh ur reizhiad en doa dija graet divizoù warni. N'oa ket frank pa'z eas d'ober. Japan ma oa ec'h ivañ ennañ a oa ur Japan gant e rummadoù dezhi evit ar maouezed, evit ar mammoù, evit an dud o c'houlennañ ar goulennioù fazi. Deuet eo da vezañ ar pezh a c'houlennas ar reizhiad outi, ha goude klasket en deus implij ar pezh a roias ar reizhiad d'am mirout da vezañ degeset gantañ.</div>

<p>N'eo ket ur c'hwall an dra-se. Unan eo oc'h klask bevañ en ur stumm n'en deus ket savet, hag oc'h klask kemer gantañ unan a gar.</p>

<p>Pell amzer em eus passet gant ar pennadoù-mañ — Baran, Lamport, Shamir, Merkle, Rabin, Back, Nakamoto, Buterin. Ar pezh a rangomp anezho en-dro zo ur gudenn genn: penaos sevel un dra bennak a labour hep ur c'hreizenn fiziañs? Penaos krouiñ ur reizhiad n'eo ket dazont eus unan bennag awennorezh nemetañ da virout e-barzh?</p>

<p>Soñjal a ran bremañ ouzh ar goulenn-se en un doare all. N'eo ket ur goulenn teknikel nemetañ. Ar goulenn eo ma oa ma mamm o bevañ ganti. Penaos mirout unan pa 'z eo ar stummadoù a dlefe mirout an dud an re-same hag a ya d'o rummañ, o bevenñ, o tistreiñ diouzh ar pezh m'o defe c'hallaouet bezañ?</p>

<p>E respontoù oa diparfet. Ar muiañ-part eus ar respontoù d'ar goulenn-se int. Met ur respont eo savet diwar an dibarzhioù en doa da vat, ket diwar an dibarzhioù a dlefe bet.</p>

<div class="pull">Parch am eus ouzhi evit an dra-se. Ket e-pad ar c'hostadenn. Parch am eus ouzhi o kynnyñ ar c'hostadenn, dre ma komprenañ bremañ gant petra oa o labourat.</div>

<p>A-raok deskrivañ pelec'h e ya an dra-mañ, me a fell din displegañ perak eo bet savet en ur doare evel ma oa bet savet.</p>

<p>Pem pe c'hwec'h vloaz zo, sellet em eus ouzh koursoù MIT 6.824 diwar-benn reizhiadoù rannec'h war YouTube. Setu ar mare ma oa un dra bennak o cheñch. Lenn a raenn diwar-benn surentez, diwar-benn arkitektouriezh an titouroù, diwar-benn penaos e vez fazi ar reizhiadoù. Ar c'hoursoù a reas ar stumm gwelout. Deraouet em eus da zastum material diwar-benn reizhiadoù rannec'h — petra a sinifi ar rannadur, penaos en deus deuet da vezañ, pelec'h e meu. Eus setu e teu ar c'hadur web3.</p>

<p>Ar poent deraouañ a oa Brave. Ar mennozh eus ur merdeer o zilemel ar bruderezh a-bezh — ket evel ur perzh, met evel un engajiamant stummel — en doa ster din a-raok ma'z em boa ar gerioù da zisplegañ perak. Passet em boa bloavezhioù o vezañ kemmestreet ha taolet war hent fazi gant titouroù furmulet gant perc'hennoù marc'hadourel n'am boa ket tu da welet. N'eo ket ur livradur nevez ar bruderezh. Ur sil eo war ar pezh a deu ac'hanout ha penaos e vez kadreet. N'am boa ket c'hoant da sevel war ar stumm-se.</p>

<div class="pull">Ar goulenn ne oa ket: hag ez tlefe bezañ web3 an dra-mañ? Ar goulenn a oa: pe arkitektouriezh a ra impossibl d'unan bennag awennorezh kreizell kontrollañ ar pezh a zeskont an dud? Web3 ne oa ket ur red a heulienn. Ar respont a oa d'ur goulenn m'oa dija o bevañ ganti.</div>

<p>N'eo ket ur gwellvezh teknikel ar rannadur. An arkitektouriezh nemetañ n'hall ket bezañ kempenet eo. Ur bladform kreiziet a c'hall bezañ strebet, prenet pe serret. Ur bladform rannec'h n'hall ket da den bezañ — ar pezh a sinifi n'hall ket bezañ implijet a-enep an dud o implij anezhañ.</p>

<p>Pouezus eo an dra-se amañ dre ma kario cipher.learn titouroù ma vije gwelloc'h gant rummadoù bennag bezañ dianv — ket dre ma z'int perillus, met dre ma cheñch an deskadurezh teknikel digor piv a c'hall kemer perzh er gaozioù teknikel. Ar pennadoù em eus diuzet a zo foran. Ar c'hennaskeladurioù etre anezho n'int ket desket. Ar fonn-se a vez mirout gant ar c'hostadenn, gant ar yezh, gant ar rekistoù kredañsoù. Klask a ran e serriñ en ur stumm n'hall ket bezañ serret adarre.</p>

<p>Tro 2020, un dra bennak a reas an dra-mañ konkret. E-pad ar mare COVID, e Japan un niver a dud en doa kemennoù a-walc'h a arc'hantaoueg kriptonek a voe arrestet. Gwelet em eus an dra-se o c'hoarvezout. Ar siouas a grouaz ennon a oa dibar: e Japan, sevel un dra bennak karget eus ar soñj web3 ne oa ket nemetañ kompliket a-live moneiz — e kargañ ur risk lezenn o kresk. Real e oa ar steredadur hag a veze gwelout muioc'h-mui.</p>

<p>Eus ar mare-se deraouet em eus da soñjal mat ouzh bro orin Hawking. Bro-Saoz. Wimbledon. Ur c'hennaskelañ iskis a zelehe bezañ an dra-se, met sklaer e oa ar rezoniadur: lemet en doa COVID ar c'hemmoù, ha soñjal a raenn penaos e c'halle bezañ ur benveg goude COVID. Mirit em eus o sevel un arloadur treninañ tennis — Wimbledon evel ur wern kenstur, an analiz mouezhiadur evel ur gudenn teknikel. Skeudenniñ a ris. Skeudenn anatomek, analiz potur ar c'hoarzerien, enmonegezh reolennoù servij, integradur reolioù. Goude en em stoppas. Ar abeg a oa dibar: an arloadur m'oa oc'h soñjal ennañ a vije graet rekis ur c'hastell penndalc'h a roadennoù korv, un trubuilh skeudennoù ha heuliadeg mouezhiadur. Endro reolennoù roadennoù Europa — ar RGPD hag an infrastumm trubuilh a zo etre — a sinifias e koueze diouzhtu en ur reolennadur dleadoù respetadur arloadur europeat pe da dud pa ne c'hallfenn ket respetañ eus ma lec'h. Lakaet em eus anezhañ.</p>
