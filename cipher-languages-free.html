'de': {
  s1_label: 'Sprachen und Kulturelle Abdeckung',
  s1: `<p>cipher.learn ist in einer Auswahl westeuropäischer und nordatlantischer Sprachen verfügbar. Minderheits- und Regionalsprachen sind neben den Hauptsprachen einbezogen, was Europas Tradition der sorgfältigen Auseinandersetzung mit Information und Kultur widerspiegelt — wie sie in Rahmenbedingungen wie dem Recht auf Vergessenwerden zum Ausdruck kommt.</p>

'de-CH': {
  s1_label: 'Sprachen und Kulturelle Abdeckung',
  s1: `<p>cipher.learn ist in einer Auswahl westeuropäischer und nordatlantischer Sprachen verfügbar. Minderheits- und Regionalsprachen sind neben den Hauptsprachen einbezogen, was Europas Tradition der sorgfältigen Auseinandersetzung mit Information und Kultur widerspiegelt — wie sie in Rahmenbedingungen wie dem Recht auf Vergessenwerden zum Ausdruck kommt.</p>
<div class="pull">Übersetzung wird als unterstützendes Hilfsmittel behandelt. Sie kann niemals vollständig die Nuance und den Kontext jeder Sprache reproduzieren — und diese Einschränkung wird hier ernst genommen.</div>
<p>Die Einbeziehung von Minderheitensprachen — Bretonisch, Okzitanisch, Baskisch, Rätoromanisch, Korsisch, Luxemburgisch, Galizisch, Katalanisch — ist keine symbolische Geste. Diese Sprachen tragen eigenständige Arten, Gedanken zu strukturieren und die Welt zu beschreiben. Inhalte in diesen Sprachen anzubieten ist eine Anerkennung, dass Verstehen immer am klarsten in der einem am nächsten stehenden Sprache ist.</p>
<p>Dies spiegelt ein übergeordnetes Prinzip wider: Der Wert einer Sprache bemisst sich nicht an der Zahl ihrer Sprechenden. Je weniger Menschen eine Sprache verwenden, desto bedeutungsvoller wird es, sie darin zu erreichen.</p>`,
  s2_label: 'Umfang und Seine Grenzen',
  s2: `<p>Das Projekt nahm anfänglich Island als Referenzpunkt — eine kleine, technisch versierte Gesellschaft mit einer starken kulturellen Identität und einer ungewöhnlich bewussten Beziehung zu ihrer eigenen Sprache. Von dort aus erweiterte sich der Umfang auf Regionen, die nachhaltigen Kulturschutz aufrechterhalten, Minderheitenkulturen neben Mehrheitssprachen unterstützen oder spezifische sprachliche Traditionen wahren.</p>
<p>Diese Entscheidungen wurden bewusst getroffen. Das Ziel war nicht, dominante Sprachen nach Sprecherzahl aufzulisten, sondern Regionen zu identifizieren, in denen sprachliche und kulturelle Integrität als etwas behandelt wird, das es wert ist, bewahrt zu werden.</p>
<div class="pull">Japanisch wird derzeit nicht angeboten — nicht aus kulturellen Präferenzen, sondern weil der Designumfang in dieser Phase begrenzt ist.</div>
<p>Ich bin in Japan geboren und aufgewachsen. Das Fehlen von Japanisch ist keine Aussage über japanische Kultur oder Sprache. Verschiedene Regionen haben unterschiedliche Ansätze zu technischem Verständnis, Sicherheitsbewusstsein und Plattformdesign-Philosophie. Die Grenzen hier spiegeln Designkohärenz wider, keine Ausgrenzung — und diese Grenze kann sich verschieben.</p>`
},

'nl': {
  s1_label: 'Talen en Culturele Dekking',
  s1: `<p>cipher.learn is beschikbaar in een selectie van West-Europese en Noord-Atlantische talen. Minderheidstalen en regionale talen zijn opgenomen naast de grote talen, wat de Europese traditie van zorgvuldige omgang met informatie en cultuur weerspiegelt — zoals tot uitdrukking gebracht in kaders zoals het Recht op Vergetelheid.</p>
<div class="pull">Vertaling wordt behandeld als een ondersteunend hulpmiddel. Het kan nooit volledig de nuance en context van elke taal reproduceren — en die beperking wordt hier serieus genomen.</div>
<p>De opname van minderheidstalen — Bretons, Occitaans, Baskisch, Reto-Romaans, Corsicaans, Luxemburgs, Galicisch, Catalaans — is geen symbolisch gebaar. Deze talen dragen onderscheidende manieren om gedachten te structureren en de wereld te beschrijven. Inhoud in deze talen aanbieden is een erkenning dat begrip altijd het helderst is in de taal die het dichtst bij je staat.</p>
<p>Dit weerspiegelt een breder principe: de waarde van een taal schaalt niet met het aantal sprekers. Hoe minder mensen een taal gebruiken, hoe betekenisvoller het wordt hen erin te bereiken.</p>`,
  s2_label: 'Reikwijdte en Zijn Grenzen',
  s2: `<p>Het project nam aanvankelijk IJsland als referentiepunt — een kleine, technisch geletterde samenleving met een sterke culturele identiteit en een ongewoon bewuste relatie met haar eigen taal. Van daaruit breidde de reikwijdte zich uit naar regio's die duurzame cultuurprotectie handhaven, minderheidscultuuren naast meerderheidstalen ondersteunen, of specifieke taalkundige tradities hooghouden.</p>
<p>Deze keuzes werden bewust gemaakt. Het doel was niet om dominante talen op te sommen naar aantal sprekers, maar om regio's te identificeren waar taalkundige en culturele integriteit wordt behandeld als iets dat de moeite waard is om te beschermen.</p>
<div class="pull">Japans wordt momenteel niet aangeboden — niet vanwege culturele voorkeur, maar simpelweg omdat de ontwerpomvang in dit stadium beperkt is.</div>
<p>Ik ben geboren en opgegroeid in Japan. De afwezigheid van Japans is geen uitspraak over Japanse cultuur of taal. Verschillende regio's hebben verschillende benaderingen van technisch begrip, beveiligingsbewustzijn en platformontwerpfilosofie. De grenzen hier weerspiegelen ontwerpcoherentie, geen uitsluiting — en die grens kan verschuiven.</p>`
},

'lb': {
  s1_label: 'Sprooche a Kulturell Ofdeckung',
  s1: `<p>cipher.learn ass a enger Auswiel vun westeuropäesche a nordatlanteschen Sprooche verfügbar. Minderheetsprooche a Regionalsprooche sinn nieft den Haaptsprooche abegraff, wat Europas Traditioun vun der souergtfälteger Ausernandersetzung mat Informatioun a Kultur widerspigelt — wéi se a Kader wéi dem Recht op Vergiessenwerden zum Ausdrock kënnt.</p>
<div class="pull">Iwwersetzung gëtt als ënnerstëtzend Wierkszeit behandelt. Si ka ni vollständeg d'Nuance an de Kontext vun all Sprooch reproduzéieren — an dës Aschränkung gëtt hei ernst geholl.</div>
<p>D'Abeziehung vun de Minderheetsprooche — Bretonnesch, Okzitanesch, Baskisch, Rätoromanisch, Korsesch, Lëtzebuergesch, Galizesch, Katalanesch — ass kee symboleschen Geste. Dës Sprooche droen eegenstänneg Aarte, Gedanken ze strukturéieren an d'Welt ze beschreiwen. Inhalter a dëse Sprooche ubizidde ass eng Unerkennong, datt Verstoen ëmmer am kloersten an der Sprooch ass, déi engem am nooste steet.</p>
<p>Dat reflektéiert e méi breede Prinzip: De Wäert vun enger Sprooch skaléiert net mat der Zuel vun hire Spriecher. Jodéi méi wéineg Mënschen eng Sprooch benotzen, dest méi wichteg gëtt et, si dorin ze erreechen.</div>`,
  s2_label: 'Ëmfang a Seng Grenzen',
  s2: `<p>D'Projekt huet am Ufank Island als Referenzpunkt geholl — eng kleng, technesch gebildet Gesellschaft mat enger staarker kultureller Identitéit an enger ongewéinlech bewosster Bezéiung mat hirer eegener Sprooch. Vun do aus huet sech den Ëmfang op Regiounen erweidert, déi dauerhaften Kulturschutz oprechterhalden, Minderheetskulture nieft Majoritéitssprooche ënnerstëtzen, oder spezifesch sproochlech Traditiounen erhalen.</p>
<p>Dës Entscheedungen goufen bewosst getraff. D'Zil war net, dominant Sprooche no Sprecher­zuel opzelëschten, mee Regiounen ze identifizéieren, wou sproochlech a kulturell Integritéit als eppes behandelt gëtt, dat et wäert ass ze schützen.</p>
<div class="pull">Japanesch gëtt derzeit net ugebueden — net aus kulturelle Präferenzen, mee well den Designëmfang an dëser Phase limitéiert ass.</div>
<p>Ech sinn a Japan gebuer a grouss ginn. D'Feele vu Japanesch ass keng Aussoe iwwer japanesch Kultur oder Sprooch. Verschidde Regiounen hunn ënnerschiddlech Approche fir technescht Verständnis, Sécherheetsbewosstsi an Plattformdesign-Philosophie. D'Grenzen hei reflektéieren Designkohärenz, keng Ausgrenzung — an dës Grenz kann sech verréckelen.</p>`
},

'it': {
  s1_label: 'Lingue e Copertura Culturale',
  s1: `<p>cipher.learn è disponibile in una selezione di lingue dell'Europa occidentale e dell'Atlantico settentrionale. Le lingue minoritarie e regionali sono incluse accanto alle principali, riflettendo la tradizione europea di attenta considerazione dell'informazione e della cultura — come esemplificato in quadri quali il Diritto all'oblio.</p>
<div class="pull">La traduzione è trattata come uno strumento di supporto. Non può mai riprodurre pienamente la sfumatura e il contesto di ogni lingua — e questo limite viene preso sul serio qui.</div>
<p>L'inclusione delle lingue minoritarie — bretone, occitano, basco, romancio, corso, lussemburghese, galiziano, catalano — non è un gesto simbolico. Queste lingue portano modi distinti di strutturare il pensiero e descrivere il mondo. Offrire contenuti in queste lingue è un riconoscimento che la comprensione è sempre più chiara nella lingua più vicina a sé.</p>
<p>Questo riflette un principio più ampio: il valore di una lingua non scala con il numero dei suoi parlanti. Meno persone usano una lingua, più diventa significativo raggiungerle in essa.</p>`,
  s2_label: 'Portata e Suoi Limiti',
  s2: `<p>Il progetto ha inizialmente preso l'Islanda come punto di riferimento — una piccola società tecnicamente alfabetizzata con una forte identità culturale e un rapporto insolitamente consapevole con la propria lingua. Da lì, la portata si è espansa a regioni che mantengono una protezione culturale duratura, supportano identità culturali minoritarie accanto alle lingue maggioritarie, o preservano tradizioni linguistiche specifiche.</p>
<p>Queste scelte sono state fatte deliberatamente. L'obiettivo non era elencare le lingue dominanti per numero di parlanti, ma identificare le regioni in cui l'integrità linguistica e culturale è trattata come qualcosa che vale la pena proteggere.</p>
<div class="pull">Il giapponese non è attualmente offerto — non per preferenza culturale, ma semplicemente perché la portata del design è limitata in questa fase.</div>
<p>Sono nato e cresciuto in Giappone. L'assenza del giapponese non è una dichiarazione sulla cultura o sulla lingua giapponese. Regioni diverse hanno approcci diversi alla comprensione tecnica, alla consapevolezza della sicurezza e alla filosofia di progettazione delle piattaforme. I confini qui riflettono la coerenza del design, non l'esclusione — e questo confine può spostarsi.</p>`
},

'pt': {
  s1_label: 'Línguas e Cobertura Cultural',
  s1: `<p>cipher.learn está disponível numa seleção de línguas da Europa Ocidental e do Atlântico Norte. As línguas minoritárias e regionais estão incluídas a par das principais, refletindo a tradição europeia de consideração cuidadosa da informação e da cultura — como exemplificado em quadros como o Direito ao Esquecimento.</p>
<div class="pull">A tradução é tratada como um instrumento de apoio. Nunca pode reproduzir plenamente a nuance e o contexto de cada língua — e essa limitação é levada a sério aqui.</div>
<p>A inclusão de línguas minoritárias — bretão, occitano, basco, romanche, corso, luxemburguês, galego, catalão — não é um gesto simbólico. Estas línguas transportam formas distintas de estruturar o pensamento e descrever o mundo. Oferecer conteúdo nessas línguas é um reconhecimento de que a compreensão é sempre mais clara na língua mais próxima de si.</p>
<p>Isto reflete um princípio mais amplo: o valor de uma língua não escala com o número de falantes. Quanto menos pessoas usam uma língua, mais significativo se torna alcançá-las nela.</p>`,
  s2_label: 'Âmbito e Os Seus Limites',
  s2: `<p>O projeto tomou inicialmente a Islândia como ponto de referência — uma pequena sociedade tecnicamente literata, com uma forte identidade cultural e uma relação invulgarmente consciente com a sua própria língua. A partir daí, o âmbito expandiu-se para regiões que mantêm proteção cultural sustentada, apoiam identidades culturais minoritárias a par de línguas maioritárias, ou preservam tradições linguísticas específicas.</p>
<p>Estas escolhas foram feitas deliberadamente. O objetivo não era listar línguas dominantes por número de falantes, mas identificar regiões onde a integridade linguística e cultural é tratada como algo que vale a pena proteger.</p>
<div class="pull">O japonês não está atualmente disponível — não por preferência cultural, mas simplesmente porque o âmbito de design é limitado nesta fase.</div>
<p>Nasci e cresci no Japão. A ausência do japonês não é uma declaração sobre a cultura ou a língua japonesa. Regiões diferentes têm abordagens diferentes à compreensão técnica, à consciência de segurança e à filosofia de design de plataformas. Os limites aqui refletem a coerência de design, não a exclusão — e esse limite pode mudar.</p>`
},

'es': {
  s1_label: 'Idiomas y Cobertura Cultural',
  s1: `<p>cipher.learn está disponible en una selección de idiomas de Europa Occidental y el Atlántico Norte. Las lenguas minoritarias y regionales se incluyen junto a las principales, reflejando la tradición europea de consideración cuidadosa de la información y la cultura — tal como se ejemplifica en marcos como el Derecho al Olvido.</p>
<div class="pull">La traducción se trata como una herramienta de apoyo. Nunca puede reproducir completamente el matiz y el contexto de cada idioma — y esa limitación se toma en serio aquí.</div>
<p>La inclusión de lenguas minoritarias — bretón, occitano, vasco, romanche, corso, luxemburgués, gallego, catalán — no es un gesto simbólico. Estas lenguas portan formas distintas de estructurar el pensamiento y describir el mundo. Ofrecer contenido en ellas es un reconocimiento de que la comprensión siempre es más clara en la lengua más cercana a uno.</p>
<p>Esto refleja un principio más amplio: el valor de un idioma no escala con el número de hablantes. Cuantas menos personas usan un idioma, más significativo se vuelve alcanzarlas en él.</p>`,
  s2_label: 'Alcance y Sus Límites',
  s2: `<p>El proyecto tomó inicialmente Islandia como punto de referencia — una pequeña sociedad técnicamente alfabetizada con una fuerte identidad cultural y una relación inusualmente consciente con su propio idioma. Desde allí, el alcance se expandió a regiones que mantienen una protección cultural sostenida, apoyan identidades culturales minoritarias junto a idiomas mayoritarios, o preservan tradiciones lingüísticas específicas.</p>
<p>Estas elecciones se hicieron deliberadamente. El objetivo no era enumerar idiomas dominantes por número de hablantes, sino identificar regiones donde la integridad lingüística y cultural se trata como algo que vale la pena proteger.</p>
<div class="pull">El japonés no se ofrece actualmente — no por preferencia cultural, sino simplemente porque el alcance del diseño está limitado en esta etapa.</div>
<p>Nací y crecí en Japón. La ausencia del japonés no es una declaración sobre la cultura o el idioma japonés. Distintas regiones tienen enfoques diferentes hacia la comprensión técnica, la conciencia de seguridad y la filosofía de diseño de plataformas. Los límites aquí reflejan coherencia de diseño, no exclusión — y ese límite puede cambiar.</p>`
},

'is': {
  s1_label: 'Tungumál og Menningarleg Umfjöllun',
  s1: `<p>cipher.learn er fáanlegt á úrvali af Vestur-Evrópskum og Norður-Atlantshafs tungumálum. Minnihluta- og svæðisbundin tungumál eru með ásamt helstu tungumálunum, sem endurspeglar hefð Evrópu fyrir vandvirkri meðhöndlun á upplýsingum og menningu — eins og sést í ramma eins og réttinum til að gleymast.</p>
<div class="pull">Þýðing er meðhöndluð sem stuðningsverkfæri. Hún getur aldrei að fullu endurskapað blæbrigðin og samhengið í hverju tungumáli — og sú takmörkun er tekin alvarlega hér.</div>
<p>Inntaka minnihlutamála — bretónsku, okkítönsku, baski, rómönsku, korsísku, lúxemborgsku, galisísku, katalónsku — er ekki táknræn bendingur. Þessi tungumál bera sérstæðar leiðir til að skipuleggja hugsun og lýsa heiminum. Að bjóða upp á efni á þessum tungumálum er viðurkenning á því að skilningur er alltaf skýrastur á því tungumáli sem er manni næst.</p>
<p>Þetta endurspeglar víðtækara meginreglu: gildi tungumáls skalast ekki með fjölda þess talenda. Því færri sem nota tungumál, þeim mun þýðingarmeiri verður það að ná til þeirra á því.</p>`,
  s2_label: 'Umfang og Mörk Þess',
  s2: `<p>Verkefnið tók upphaflega Ísland sem viðmiðunarpunkt — lítið, tæknilega læst samfélag með sterka menningarlega sjálfsmynd og óvenju meðvitaða tengsl við eigið tungumál. Þaðan þanist umfangið út til svæða sem viðhalda viðvarandi menningarvernd, styðja minnihlutamenningu hlið við hlið með meirihlutamálum, eða varðveita sérstakar málvísindarlegar hefðir.</p>
<p>Þessar ákvarðanir voru teknar meðvitað. Markmiðið var ekki að telja upp ráðandi tungumál eftir fjölda talenda, heldur að bera kennsl á svæði þar sem tungumálleg og menningarleg heilindi eru meðhöndluð sem eitthvað sem er þess virði að vernda.</p>
<div class="pull">Japanska er ekki í boði eins og er — ekki vegna menningarlegrar óskugar, heldur einfaldlega vegna þess að hönnunarumfangið er takmarkað á þessum tímapunkti.</div>
<p>Ég fæddist og ólst upp á Japani. Fjarvera japönsku er ekki yfirlýsing um japanska menningu eða tungumál. Mismunandi svæði hafa mismunandi nálganir á tæknilegan skilning, öryggismeðvitund og heimspeki í hönnun vettvanga. Mörkin hér endurspegla hönnunarsamræmi, ekki útilokun — og þau mörk geta breyst.</p>`
},

'ca': {
  s1_label: 'Llengües i Cobertura Cultural',
  s1: `<p>cipher.learn està disponible en una selecció de llengües d'Europa occidental i de l'Atlàntic nord. Les llengües minoritàries i regionals s'inclouen juntament amb les principals, reflectint la tradició europea de consideració acurada de la informació i la cultura — tal com s'exemplifica en marcs com el Dret a l'Oblit.</p>
<div class="pull">La traducció es tracta com una eina de suport. Mai no pot reproduir plenament el matís i el context de cada llengua — i aquesta limitació es pren seriosament aquí.</div>
<p>La inclusió de les llengües minoritàries — bretó, occità, basc, romanx, cors, luxemburguès, gallec, català — no és un gest simbòlic. Aquestes llengües porten formes distintives d'estructurar el pensament i descriure el món. Oferir contingut en elles és un reconeixement que la comprensió sempre és més clara en la llengua més propera a un.</p>
<p>Això reflecteix un principi més ampli: el valor d'una llengua no escala amb el nombre de parlants. Com menys gent fa servir una llengua, més significatiu es torna arribar-los-hi en ella.</p>`,
  s2_label: 'Abast i Els Seus Límits',
  s2: `<p>El projecte va prendre inicialment Islàndia com a punt de referència — una petita societat tècnicament alfabetitzada amb una forta identitat cultural i una relació inusualment conscient amb la seva pròpia llengua. Des d'allà, l'abast es va expandir a regions que mantenen una protecció cultural sostinguda, suporten identitats culturals minoritàries al costat de les llengües majoritàries, o preserven tradicions lingüístiques específiques.</p>
<p>Aquestes eleccions es van fer deliberadament. L'objectiu no era llistar les llengües dominants per nombre de parlants, sinó identificar les regions on la integritat lingüística i cultural es tracta com quelcom que val la pena protegir.</p>
<div class="pull">El japonès no s'ofereix actualment — no per preferència cultural, sinó simplement perquè l'abast del disseny és limitat en aquesta etapa.</div>
<p>Vaig néixer i créixer al Japó. L'absència del japonès no és una declaració sobre la cultura o la llengua japonesa. Diferents regions tenen enfocaments diferents cap a la comprensió tècnica, la consciència de seguretat i la filosofia de disseny de plataformes. Els límits aquí reflecteixen coherència de disseny, no exclusió — i aquest límit pot canviar.</p>`
},

'eu': {
  s1_label: 'Hizkuntzak eta Kultura Estaldura',
  s1: `<p>cipher.learn Mendebaldeko Europako eta Ipar Atlantikoko hizkuntzen aukeraketa batean eskuragarri dago. Gutxiengo eta eskualdeko hizkuntzak nagusien ondoan sartuta daude, Europaren informazio eta kulturaren inguruko arreta handiko tradizioa islatuz — Ahaztuaren Eskubidea bezalako esparruetan adibidez ikusten den moduan.</p>
<div class="pull">Itzulpena laguntza tresna gisa tratatzen da. Ezin du inoiz hizkuntza bakoitzaren nuanceak eta testuingurua guztiz erreproduzitu — eta muga hori hemen serioski hartzen da.</div>
<p>Gutxiengo hizkuntzen sartzea — bretoiera, okzitaniera, euskara, erromantxera, korsikera, luxenburgera, galiziera, katalana — ez da keinu sinbolikoa. Hizkuntza hauek pentsamenduak egituratzen eta mundua deskribatzen modu desberdinak dituzte. Haietako edukia eskaintzea aitorpen bat da: ulermena beti argiena da norbanakoari gertuen dagoen hizkuntzan.</p>
<p>Honek printzipio zabalago bat islatzen du: hizkuntza baten balioa ez da bere hiztunen kopuruarekin eskala. Hizkuntza bat gutxiago erabiltzen duten pertsonek, orduan eta esanguratsuagoa da haietara horretan iristea.</p>`,
  s2_label: 'Esparrua eta Bere Mugak',
  s2: `<p>Proiektuak hasiera batean Islandia hartu zuen erreferentzia puntu gisa — kultura identitate sendo eta bere hizkuntzarekin ohiz kanpoko harreman kontziente duen gizarte txiki eta teknikoki alfabetatua. Handik aurrera, esparrua zabaldu zen kultura babes iraunkorra mantentzen duten, gutxiengo kultura identitateak nagusitasuneko hizkuntzen ondoan babesten dituzten, edo hizkuntza tradizio zehatzak gorde­tzen dituzten eskualdeetara.</p>
<p>Aukera hauek nahita egin ziren. Helburua ez zen hizkuntza nagusiak hiztunen kopuruaren arabera zerrendatzea, baizik eta hizkuntza eta kultura osotasuna babesteko moduko zerbait gisa tratatzen den eskualdeak identifikatzea.</p>
<div class="pull">Japoniera ez dago gaur egun eskuragarri — kultura lehentasunagatik ez, baizik eta diseinu esparrua une honetan mugatuta dagoelako.</div>
<p>Japonian jaio eta hazi nintzen. Japonieraren falta ez da japoniar kultura edo hizkuntzari buruzko adierazpen bat. Eskualde desberdinak modu desberdinetan hurbiltzen dira ulermen tekniko, segurtasun kontzientzia eta plataforma diseinu filosofiara. Hemen mugak diseinu kohesio islatzen dute, ez baztertzea — eta muga hori alda daiteke.</p>`
},

'gl': {
  s1_label: 'Linguas e Cobertura Cultural',
  s1: `<p>cipher.learn está dispoñible nunha selección de linguas de Europa Occidental e do Atlántico Norte. As linguas minoritarias e rexionais inclúense xunto ás principais, reflectindo a tradición europea de consideración coidadosa da información e a cultura — tal como se exemplifica en marcos como o Dereito ao Esquecemento.</p>
<div class="pull">A tradución trátase como unha ferramenta de apoio. Nunca pode reproducir plenamente o matiz e o contexto de cada lingua — e esa limitación tómase en serio aquí.</div>
<p>A inclusión de linguas minoritarias — bretón, occitano, éuscaro, romanche, corso, luxemburgués, galego, catalán — non é un xesto simbólico. Estas linguas portan formas distintivas de estruturar o pensamento e describir o mundo. Ofrecer contido nelas é un recoñecemento de que a comprensión é sempre máis clara na lingua máis próxima a un.</p>
<p>Isto reflicte un principio máis amplo: o valor dunha lingua non escala co número de falantes. Canto menos xente usa unha lingua, máis significativo se volver chegar a elas nela.</p>`,
  s2_label: 'Alcance e Os Seus Límites',
  s2: `<p>O proxecto tomou inicialmente Islandia como punto de referencia — unha pequena sociedade tecnicamente alfabetizada cunha forte identidade cultural e unha relación inusualmente consciente coa súa propia lingua. Desde alí, o alcance expandiuse a rexións que manteñen protección cultural sostida, apoian identidades culturais minoritarias xunto a linguas maioritarias, ou preservan tradicións lingüísticas específicas.</p>
<p>Estas eleccións fixéronse deliberadamente. O obxectivo non era listar linguas dominantes por número de falantes, senón identificar rexións onde a integridade lingüística e cultural se trata como algo que paga a pena protexer.</p>
<div class="pull">O xaponés non se ofrece actualmente — non por preferencia cultural, senón simplemente porque o alcance do deseño está limitado nesta etapa.</div>
<p>Nacín e medrei en Xapón. A ausencia do xaponés non é unha declaración sobre a cultura ou a lingua xaponesa. Distintas rexións teñen enfoques diferentes cara á comprensión técnica, a conciencia de seguridade e a filosofía de deseño de plataformas. Os límites aquí reflicten coherencia de deseño, non exclusión — e ese límite pode cambiar.</p>`
},

'oc': {
  s1_label: 'Lengas e Cobèrtura Culturala',
  s1: `<p>cipher.learn es disponible dins una seleccion de lengas d'Euròpa occidentala e de l'Atlantic del nòrd. Las lengas minoritàrias e regionalas son inclosas a costat de las principalas, en reflectent la tradicion europèa de consideracion segura de l'informacion e de la cultura — tala qu'ilustrada dins de cadres coma lo Dreit d'èsser oblidat.</p>
<div class="pull">La traduccion es tractada coma un aisinas de sosten. Pòt jamai reproduire plenament la nuança e lo contèxt de cada lenga — e aquesta limitacion es presa en serièu aicí.</div>
<p>L'inclusion de las lengas minoritàrias — breton, occitan, basc, romanche, còrs, luxemborgés, galicien, catalan — es pas un geste simbolic. Aquestas lengas pòrton de manièras distintas de estructurar la pensada e de descriure lo monde. Ofrir de contengut en aquestas lengas es una reconaisença que la comprension es totjorn la mai clara dins la lenga la mai prèp de tu.</p>

  s2_label: 'Portada e Sas Limitas',
  s2: `<p>Lo projècte a pres al debòt l'Islàndia coma punt de referéncia — una societat pichona, tecnicamente letrada, amb una fòrta identitat culturala e una relacion insolitament conscenta amb sa pròpria lenga. D'aquí, la portada s'es estenduda a de regions que mantènon una proteccion culturala durabla, sostenon de identitats culturalas minoritàrias a costat de lengas majoritàrias, o preservon de tradicions lingüisticas especificas.</p>

'br': {
  s1_label: 'Yezhoù ha Kudennad Sevenadur',
  s1: `<p>cipher.learn a zo hegerz en ur reizhadur yezhoù Europa ar Kornôg hag Atlantel an Norzh. Yezhoù minorelaet ha rannyezhoù a zo lakaet e-touez ar re vras, o tegas en-dro hengoun Europa a soñj divent eus an titouroù hag ar sevenadur — evel ma vez gwelet e frammoù evel ar Gwir da vezañ ankoueet.</p>

<p>Lakaat yezhoù minorelaet — brezhoneg, okitaneg, euskareg, romañcheg, korseg, luksemburgeg, galiseg, katalaneg — n'eo ket un tro-kaer sinolik. Ar yezhoù-mañ a zo o tougen doareoù disheñvel da reiñ stumm d'ar soñjoù ha da deskrivañ ar bed. Kinnig endalc'had en ar yezhoù-se eo anavezout ez eo ar c'hompren bepred ar sklaerañ er yezh ar peurañ deoc'h.</p>
<p>Hemañ a adkas ur reizenn vrasoc'h : talvoudegezh ur yezh ne skoalc'h ket gant niver e dud. Nebeutoc'h a dud a implij ur yezh, talvoudusoc'h e teu bezañ da zont ateze enni.</p>`,
  s2_label: 'Framm ha Melestradurezh',
  s2: `<p>Ar raktres a zo bet lakaet d'ober gant Island da bointenn daveenn da gentañ — ur gevredigezh vihan, lennegel war dachenn teknikel, gant un identelezh sevenaduriel kreñv ha darempred divent-kenañ gant e yezh o unan. Diouti-se en deus a-raok eeunvezh an daveenn war-zu rannvroioù a c'haller da glevet o mirout gwarizi sevenaduriel pell, a skoazell identelezhoù sevenaduriel minorelaet e-touez yezhoù ar muiañ-brasa, pe a virout doareoù yezhegoù dibar.</p>
<p>Ar reizhoù-mañ a zo bet lakaet a-ratozh. N'eo ket bet ar pal da restañ yezhoù pennañ dre niver o dud, met da anavezout ar rannvroioù m'eo traktat integriezh yezhegoù ha sevenaduriel evel un dra talvoudus da wirañ.</p>
<div class="pull">Ar japaneg n'eo ket kinniget evit poent — ket dre gaout ur gwellañ sevenaduriel, met dre ma vez stranket ar framm reizhañ er mare-se.</div>
<p>Ganet ha kroget emaon e Japan. Digemer ar japaneg n'eo ket ur diegadenn war sevenadur pe yezh Japan. Rannvroioù disheñvel o deus doareoù disheñvel da zeskiñ teknikel, evit bezañ gant surentez, hag evit soñjal war reizhañ yezhouadurioù. Ar melestradurezh amañ a adkas an heñvelezh-reizhañ, ket an diarbarzhadur — hag ar melestradurezh-se a c'hell kemmañ.</p>`
},

let curLang = cifraGetLang();

function buildLangBar() {
  const bar = document.getElementById('langbar');
  bar.innerHTML = '';
  CIFRA_LANGS.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (l.id === curLang ? ' active' : '');
    btn.textContent = l.label + ' ' + l.id.toUpperCase();
    btn.title = l.name;
    btn.addEventListener('click', () => {
      curLang = l.id;
      cifraSetLang(l.id);
      render();
    });
    bar.appendChild(btn);
  });
}
